<script>
let stake = 1;
let wins = 0;
let losses = 0;

function saveKey() {
  let key = document.getElementById("license").value;
  localStorage.setItem("license", key);
  alert("License Saved ✅");
}

document.getElementById("market").addEventListener("change", function() {
  let symbol = this.value.replace("/", "");
  document.getElementById("chart").src =
  "https://s.tradingview.com/widgetembed/?symbol=FX:" + symbol + "&interval=1";
});

function getSignal() {
  let market = document.getElementById("market").value;
  let key = localStorage.getItem("license");

  if (!key) {
    alert("Enter License Key First!");
    return;
  }

  document.getElementById("signal").innerText = "Loading...";

  fetch("https://newaibot-production.up.railway.app/signal?symbol=" + market + "&key=" + key)
  .then(res => res.json())
  .then(data => {

    if (!data || data.error) {
      document.getElementById("signal").innerText = "❌ " + (data?.error || "No data");
      return;
    }

    document.getElementById("signal").innerText = data.signal;

    document.getElementById("extra").innerText =
      "RSI: " + (data.rsi?.toFixed(2) || "-") +
      " | Price: " + (data.price?.toFixed(5) || "-") +
      " | Trend: " + (data.trend || "-");

  })
  .catch(() => {
    alert("Backend Issues!");
  });
}

function win() {
  wins++;
  stake *= 2;
  update();
}

function loss() {
  losses++;
  stake = 1;
  update();
}

function update() {
  document.getElementById("stake").innerText = stake;
  document.getElementById("wins").innerText = wins;
  document.getElementById("losses").innerText = losses;

  let total = wins + losses;
  let wr = total ? Math.round((wins / total) * 100) : 0;
  document.getElementById("wr").innerText = wr + "%";
}
</script>
